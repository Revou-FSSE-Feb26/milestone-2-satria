<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Number</title>

    <link rel="stylesheet" href="../css/guessingNumber.css">
</head>
<body>
    <h1>Guessing Number</h1>

    <div>
        <h2>Guess a number between 1 to 100</h2>
        <input type="number" id="guessInput">
        <button id="guessButton">Submit Guess</button>
    </div>

    <div id="resultDisplay"></div>

    <div id="attemptDisplay">Attempts left: <span id="attemptCount">4</span></div>

    <div>Score: <span id="scoreDisplay">0</span></div>

    <script src="../js/guessingNumber.js"></script>
</body>
</html>
